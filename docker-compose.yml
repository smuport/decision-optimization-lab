services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:14-alpine}
    container_name: decision-lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-decision_lab}
      POSTGRES_USER: ${POSTGRES_USER:-decision_lab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-decision_lab_dev}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-decision_lab} -d ${POSTGRES_DB:-decision_lab}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
